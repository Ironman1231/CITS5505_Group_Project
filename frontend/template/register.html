<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Mobile responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register — PerthPins</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- Custom styles -->
  <link rel="stylesheet" href="../static/css/common.css">
  <link rel="stylesheet" href="../static/css/login.css">
</head>

<body>

<!--
<div id="navbar-placeholder"></div>
-->
{% include "navbar.html" %}

<div class="auth-wrapper">
  <div class="auth-card">

    <h4 class="fw-bold mb-4">Register</h4>

      <!-- Display flashed messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Original prototype-only registration form without server
    <form id="register-form">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username"
               placeholder="Choose a username" required />
        <div class="invalid-feedback">Required.</div>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email"
               placeholder="you@example.com" required />
        <div class="invalid-feedback">Required.</div>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="Enter password" required />
        <div class="invalid-feedback">Required.</div>
      </div>
      <div class="mb-4">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
               placeholder="Re-enter password" required />
        <div class="invalid-feedback">Required.</div>
      </div>
      <button type="submit" class="btn btn-pp w-100">Create Account</button>
    </form>
    -->

    <!-- Registration form with server-side processing -->
    <form id="register-form" method="post" action="{{ url_for('register') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username"
               placeholder="Choose a username" value="{{ form_data.username | default('') }}" required />
        <div class="invalid-feedback">Required.</div>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email"
               placeholder="you@example.com" value="{{ form_data.email | default('') }}" required />
        <div class="invalid-feedback">Required.</div>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="Enter password" required />
        <div class="invalid-feedback">Required.</div>
      </div>
      <div class="mb-4">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
               placeholder="Re-enter password" required />
        <div class="invalid-feedback">Required.</div>
      </div>
      <button type="submit" class="btn btn-pp w-100">Create Account</button>
    </form>

    <p class="text-center small text-muted mt-3 mb-0">
      <!--
      Already have an account? <a href="login.html" class="text-green">Log in</a>
      -->
      Already have an account? <a href="{{ url_for('login') }}" class="text-green">Log in</a>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../static/js/common.js"></script>

<script>loadComponent('navbar-placeholder', 'navbar.html');</script>

</body>
</html>
