<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — PerthPins</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../static/css/common.css" />
  <link rel="stylesheet" href="../static/css/login.css" />
</head>
<body>

<!--
<div id="navbar-placeholder"></div>
-->
{% include "navbar.html" %}

<div class="auth-wrapper">
  <div class="auth-card">

    <h4 class="fw-bold mb-4">Log In</h4>

    <form id="login-form">
      <div class="mb-3">
        <label for="login-username" class="form-label">Username or Email</label>
        <input type="text" class="form-control" id="login-username" required />
        <div class="invalid-feedback">Required.</div>
      </div>
      <div class="mb-4">
        <label for="login-password" class="form-label">Password</label>
        <input type="password" class="form-control" id="login-password" required />
        <div class="invalid-feedback">Required.</div>
      </div>
      <button type="submit" class="btn btn-pp w-100">Log In</button>
    </form>

    <p class="text-center small text-muted mt-3 mb-0">
      No account? <a href="register.html" class="text-green">Register</a>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../static/js/common.js"></script>
<!--
<script>loadComponent('navbar-placeholder', 'navbar.html');</script>
-->

</body>
</html>
