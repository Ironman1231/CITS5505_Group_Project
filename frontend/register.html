<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — PerthPins</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div id="navbar"></div>

<div class="register-page">
  <div class="register-container">

    <h4 class="register-title">Register</h4>

    <form class="register-form">

      <div class="form-group">
        <label>Username</label>
        <input type="text" class="form-control" value="prathish7">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" placeholder="Enter password">
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" class="form-control" placeholder="Re-enter password">
      </div>

      <button type="submit" class="btn btn-pp w-100">Create Account</button>

    </form>

    <p class="login-link text-center small mt-3">
      Already have an account? <a href="login.html">Log in</a>
    </p>

  </div>
</div>

</body>
</html>
